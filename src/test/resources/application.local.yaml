service:
  url: "http://localhost:8080"
  timeout: 30
feature:
  enabled: true
db:
  events:
    url: "jdbc:h2:mem:pulse_events;MODE=PostgreSQL;DATABASE_TO_UPPER=false;DB_CLOSE_DELAY=-1"
    dialect: "H2"
    username: "sa"
    password: ""
    driverClassName: "org.h2.Driver"
    pool:
      maxSize: 2
      minIdle: 0
mongo:
  uri: "mongodb://localhost:27017/pulse_backend_local"
  collections:
    rewardPrograms: "reward_programs_local"
    ruleParameters: "rule_parameters_local"
kafka:
  bootstrap:
    servers: "localhost:29092"
  topics:
    example:
      events: "pulse.example.events.local"
