service:
  url: "http://localhost:4010"
  timeout: 30
feature:
  enabled: true
db:
  events:
    url: "jdbc:postgresql://localhost:5432/sandbox_service"
    dialect: "PostgreSQL"
    username: "postgres"
    password: "postgres"
    driverClassName: "org.postgresql.Driver"
    pool:
      maxSize: 2
      minIdle: 0
mongo:
  uri: "mongodb://localhost:27017/sandbox-service"
  collections:
    sandboxOrders: "sandboxOrders"
kafka:
  bootstrap:
    servers: "127.0.0.1:9092"
  topics:
      result: "sandbox.orders.created"
