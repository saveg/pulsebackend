service:
  name: "pulse-backend"
  url: "https://pulse.example.test"
  timeout: 10
feature:
  enabled: false
db:
  list:
    - transactions
    - events
kafka:
  bootstrap:
    servers: "localhost:9092"
  consumer:
    auto:
      offset:
        reset: "latest"
    poll:
      ms: 500
  topics:
    example:
      events: "pulse.example.events"
      results: "pulse.example.results"
