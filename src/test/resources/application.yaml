service:
  name: "pulse-backend"
  url: "https://pulse.example.test"
  timeout: 10
feature:
  enabled: false
db:
  list:
    - events
  events:
    url: "jdbc:postgresql://localhost:5432/pulse_events"
    dialect: "POSTGRES"
    username: ""
    password: ""
    pool:
      maxSize: 10
      minIdle: 0
mongo:
  uri: "mongodb://localhost:27017/pulse_backend"
  collections:
    rewardPrograms: "reward_programs"
    ruleParameters: "rule_parameters"
kafka:
  bootstrap:
    servers: "127.0.0.1:9092"
  consumer:
    auto:
      offset:
        reset: "earliest"
    poll:
      ms: 500
  topics:
      result: "sandbox.orders.created"
